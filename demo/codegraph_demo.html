<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeGraph — 代码知识图谱 | CTO Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
  --border:#30363d; --text:#c9d1d9; --text2:#8b949e;
  --accent:#58a6ff; --accent2:#3fb950; --warn:#d29922;
  --red:#f85149; --purple:#bc8cff; --orange:#f0883e;
  --func:#58a6ff; --class:#3fb950; --module:#8b949e;
  --calls:#58a6ff; --contains:#3fb950; --imports:#bc8cff;
  --defines:#f0883e; --inherits:#f85149;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex}
/* Sidebar */
#sidebar{width:380px;min-width:380px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
#sidebar-header h1{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px}
#sidebar-header .sub{font-size:12px;color:var(--text2)}
#stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
.stat-card{background:var(--bg3);border-radius:6px;padding:8px 10px}
.stat-card .val{font-size:18px;font-weight:700;color:var(--accent2)}
.stat-card .lbl{font-size:10px;color:var(--text2);text-transform:uppercase}
#search-box{margin:12px 16px;position:relative}
#search-box input{width:100%;padding:8px 12px 8px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
#search-box input:focus{border-color:var(--accent)}
#search-box .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px}
#search-results{flex:1;overflow-y:auto;padding:0 16px;display:none}
#search-results.active{display:block}
.result-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:all 0.15s}
.result-item:hover{background:var(--bg3);border-color:var(--border)}
.result-item .rname{font-size:13px;font-weight:600}
.result-item .rpath{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-item .rtype{font-size:10px;padding:2px 6px;border-radius:3px;margin-left:6px}
.type-function{background:rgba(88,166,255,.15);color:var(--func)}
.type-class{background:rgba(63,185,80,.15);color:var(--class)}
.type-module{background:rgba(139,148,158,.15);color:var(--module)}
/* Node Detail Panel */
#detail-panel{display:none;flex-direction:column;border-top:1px solid var(--border);max-height:45%;overflow-y:auto}
#detail-panel.active{display:flex}
#detail-header{padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#detail-header .dh-name{font-size:15px;font-weight:700}
#detail-header .dh-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px}
#detail-body{padding:12px 16px;font-size:12px}
#detail-body .section{margin-bottom:12px}
#detail-body .section-title{font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;font-weight:600}
#detail-body .code-preview{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:11px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;max-height:200px;overflow-y:auto;color:var(--text)}
#detail-body .rel-item{padding:4px 8px;border-radius:4px;cursor:pointer;margin-bottom:2px;font-size:11px;display:flex;align-items:center;gap:6px}
#detail-body .rel-item:hover{background:var(--bg3)}
#detail-body .rel-type{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg3)}
/* Main canvas */
#main{flex:1;position:relative}
#canvas{width:100%;height:100%}
/* Toolbar */
#toolbar{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:10}
#toolbar button{padding:6px 12px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.15s;white-space:nowrap}
#toolbar button:hover{background:var(--bg3);border-color:var(--accent);color:var(--accent)}
#toolbar button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Mode selector */
#mode-bar{position:absolute;bottom:12px;left:12px;display:flex;gap:6px;z-index:10;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px}
#mode-bar button{padding:6px 14px;background:transparent;border:none;color:var(--text2);border-radius:6px;cursor:pointer;font-size:12px}
#mode-bar button.active{background:var(--bg3);color:var(--accent)}
/* Tooltip */
#tooltip{position:absolute;display:none;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;z-index:100;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4);max-width:320px}
#tooltip .tt-name{font-size:14px;font-weight:700;margin-bottom:4px}
#tooltip .tt-type{font-size:10px;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:4px}
#tooltip .tt-file{font-size:10px;color:var(--text2)}
/* Context menu */
#ctx-menu{position:absolute;display:none;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:200;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,.4)}
#ctx-menu div{padding:8px 12px;font-size:12px;cursor:pointer;border-radius:4px}
#ctx-menu div:hover{background:var(--bg3);color:var(--accent)}
/* Legend */
#legend{position:absolute;bottom:12px;right:12px;z-index:10;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px}
#legend .lg-item{display:flex;align-items:center;gap:6px;margin-bottom:4px}
#legend .lg-dot{width:10px;height:10px;border-radius:50%}
/* Loading */
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5}
#loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Overlay */
#overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:50;align-items:center;justify-content:center}
#overlay.active{display:flex}
#overlay-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;text-align:center}
#overlay-card h2{font-size:20px;margin-bottom:8px;color:var(--accent)}
#overlay-card p{font-size:13px;color:var(--text2);margin-bottom:16px}
#overlay-card .impact-stats{display:flex;gap:12px;justify-content:center;margin-bottom:16px}
#overlay-card .is-card{background:var(--bg3);border-radius:8px;padding:12px 20px}
#overlay-card .is-val{font-size:24px;font-weight:700;color:var(--warn)}
#overlay-card .is-lbl{font-size:11px;color:var(--text2)}
#overlay-card button{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;margin:4px}
#overlay-card button.secondary{background:var(--bg3);color:var(--text)}
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>🦊 CodeGraph</h1>
    <div class="sub">代码知识图谱 · 交互式分析平台</div>
  </div>
  <div id="stats-grid">
    <div class="stat-card"><div class="val" id="stat-nodes">-</div><div class="lbl">Nodes</div></div>
    <div class="stat-card"><div class="val" id="stat-edges">-</div><div class="lbl">Edges</div></div>
    <div class="stat-card"><div class="val" id="stat-files">-</div><div class="lbl">Files</div></div>
    <div class="stat-card"><div class="val" id="stat-hubs">-</div><div class="lbl">Hubs</div></div>
  </div>
  <div id="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="search-input" placeholder="搜索函数 / 类 / 模块...">
  </div>
  <div id="search-results"></div>

  <!-- Node Detail -->
  <div id="detail-panel">
    <div id="detail-header">
      <span class="dh-name" id="dh-name">-</span>
      <button class="dh-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- Main Canvas -->
<div id="main">
  <svg id="canvas"></svg>

  <!-- Loading -->
  <div id="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--text2)">Loading graph...</div></div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button onclick="traverseFrom()" title="多跳遍历">🔗 Traverse</button>
    <button onclick="impactAnalysis()" title="影响分析">💥 Impact</button>
    <button onclick="fitGraph()" title="复位视图">⊞ Fit</button>
    <button onclick="toggleLabels()" id="btn-labels">🏷 Labels</button>
  </div>

  <!-- Mode selector -->
  <div id="mode-bar">
    <button class="active" data-mode="all" onclick="switchMode('all')">全部关系</button>
    <button data-mode="calls" onclick="switchMode('calls')">调用图</button>
    <button data-mode="inherits" onclick="switchMode('inherits')">继承图</button>
    <button data-mode="imports" onclick="switchMode('imports')">导入图</button>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="lg-item"><span class="lg-dot" style="background:var(--func)"></span> Function</div>
    <div class="lg-item"><span class="lg-dot" style="background:var(--class)"></span> Class</div>
    <div class="lg-item"><span class="lg-dot" style="background:var(--module)"></span> Module</div>
    <div class="lg-item" style="font-size:10px;color:var(--text2);margin-top:4px">连线: →calls</div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

  <!-- Context Menu -->
  <div id="ctx-menu">
    <div onclick="ctxShowDetail()">📋 View Details</div>
    <div onclick="ctxTraverse()">🔗 Traverse 2-Hop</div>
    <div onclick="ctxImpact()">💥 Impact Analysis</div>
    <div onclick="ctxCallers()">👆 Who Calls Me?</div>
    <div onclick="ctxCallees()">👇 Who Do I Call?</div>
  </div>

  <!-- Impact Overlay -->
  <div id="overlay">
    <div id="overlay-card"></div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────
const API = '';
let graphData = null;
let currentMode = 'all';
let selectedNode = null;
let ctxNode = null;
let showLabels = true;
let sim = null;
let svg, g, zoom;

// ─── Init ─────────────────────────────────────────────────
async function init() {
  svg = d3.select('#canvas');
  const {width, height} = document.getElementById('main').getBoundingClientRect();
  svg.attr('viewBox', `0 0 ${width} ${height}`);

  zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  g = svg.append('g');

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id','arrow').attr('viewBox','0 -5 10 10')
    .attr('refX',20).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6)
    .attr('orient','auto')
    .append('path').attr('d','M0,-5L10,0L0,5').attr('fill','var(--text2)');

  await loadData();
  document.getElementById('loading').style.display = 'none';
}

async function loadData() {
  const resp = await fetch(`${API}/api/graph`);
  graphData = await resp.json();

  // Also load stats
  const sresp = await fetch(`${API}/api/stats`);
  const stats = await sresp.json();
  document.getElementById('stat-nodes').textContent = stats.total_nodes;
  document.getElementById('stat-edges').textContent = stats.total_edges;
  document.getElementById('stat-files').textContent = stats.parsed_files || '-';
  document.getElementById('stat-hubs').textContent = stats.hub_count || '-';

  render();
}

// ─── Render ───────────────────────────────────────────────
function render() {
  g.selectAll('*').remove();

  const nodes = graphData.nodes;
  const edges = graphData.edges;

  // Color mapping
  const nodeColors = {function: 'var(--func)', class: 'var(--class)', module: 'var(--module)'};
  const edgeColors = {calls: 'var(--calls)', contains: 'var(--contains)',
    imports: 'var(--imports)', defines: 'var(--defines)', inherits: 'var(--inherits)'};

  // Scale node size by hub score
  const maxDegree = d3.max(nodes, d => {
    const e = graphData.edges.filter(x => x.source === d.id || x.target === d.id);
    return e.length;
  }) || 1;

  // Links
  const link = g.append('g').selectAll('line')
    .data(edges).join('line')
    .attr('stroke', d => edgeColors[d.edge_type] || 'var(--text2)')
    .attr('stroke-opacity', 0.4)
    .attr('stroke-width', 0.8)
    .attr('marker-end', d => {
      // Only arrow for calls and inherits
      return (d.edge_type === 'calls' || d.edge_type === 'inherits') ? 'url(#arrow)' : null;
    });

  // Nodes
  const node = g.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x;d.fy=d.y; })
      .on('drag', (e,d) => { d.fx=e.x;d.fy=e.y; })
      .on('end', (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null;d.fy=null; }));

  node.append('circle')
    .attr('r', d => {
      const deg = graphData.edges.filter(x => x.source === d.id || x.target === d.id).length;
      return 3 + Math.sqrt(deg) * 1.5;
    })
    .attr('fill', d => nodeColors[d.node_type] || 'var(--text2)')
    .attr('stroke', d => d.id === selectedNode ? '#fff' : 'transparent')
    .attr('stroke-width', d => d.id === selectedNode ? 2 : 0);

  node.append('text')
    .attr('dx', d => {
      const deg = graphData.edges.filter(x => x.source === d.id || x.target === d.id).length;
      return 5 + Math.sqrt(deg) * 1.5;
    })
    .attr('dy', 4)
    .text(d => d.name.length > 20 ? d.name.slice(0,20)+'…' : d.name)
    .attr('font-size', 9)
    .attr('fill', 'var(--text)')
    .attr('opacity', showLabels ? 0.8 : 0);

  // Interactions
  node.on('click', (e, d) => { e.stopPropagation(); selectNode(d); })
    .on('dblclick', (e, d) => { e.stopPropagation(); showDetail(d.id); })
    .on('contextmenu', (e, d) => { e.preventDefault(); showContextMenu(e, d); })
    .on('mouseenter', (e, d) => showTooltip(e, d))
    .on('mouseleave', () => hideTooltip());

  svg.on('click', () => { hideContextMenu(); selectedNode=null; render(); });
  svg.on('contextmenu', e => e.preventDefault());

  // Simulation
  sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(60))
    .force('charge', d3.forceManyBody().strength(-150))
    .force('center', d3.forceCenter(
      document.getElementById('main').getBoundingClientRect().width/2,
      document.getElementById('main').getBoundingClientRect().height/2
    ))
    .force('collide', d3.forceCollide(15));

  sim.on('tick', () => {
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform', d=>`translate(${d.x},${d.y})`);
  });
}

// ─── Interactions ─────────────────────────────────────────
function selectNode(d) {
  selectedNode = d.id;
  render();
  fetch(`${API}/api/neighbors/${d.id}`).then(r=>r.json()).then(data => {
    graphData = data;
    render();
  });
}

async function showDetail(nodeId) {
  const resp = await fetch(`${API}/api/node/${nodeId}`);
  const data = await resp.json();
  if (data.error) return;

  const n = data.node;
  let html = `
    <div class="section">
      <div class="section-title">Overview</div>
      <div style="display:flex;gap:12px;margin-bottom:8px">
        <span class="rtype type-${n.node_type}">${n.node_type}</span>
        <span style="color:var(--text2)">hub: ${data.hub_score}</span>
        <span style="color:var(--text2)">in:${data.in_degree} out:${data.out_degree}</span>
      </div>
      <div style="font-size:11px;color:var(--text2)">${n.file_path}:${n.line_start}-${n.line_end}</div>
    </div>`+(!n.source_code?'':`
    <div class="section">
      <div class="section-title">Code Preview</div>
      <div class="code-preview">${escapeHtml(n.source_code)}</div>
    </div>`)+`
    <div class="section">
      <div class="section-title">Called By (${data.in_edges.length})</div>
      ${data.in_edges.slice(0, 8).map(e=>`
        <div class="rel-item" onclick="showDetail('${e.source}')">
          <span class="rel-type">${e.type}</span> ${e.source_name}
        </div>`).join('')}
      ${data.in_edges.length>8?`<div style="font-size:10px;color:var(--text2)">+${data.in_edges.length-8} more</div>`:''}
    </div>
    <div class="section">
      <div class="section-title">Calls (${data.out_edges.length})</div>
      ${data.out_edges.slice(0, 8).map(e=>`
        <div class="rel-item" onclick="showDetail('${e.target}')">
          <span class="rel-type">${e.type}</span> ${e.target_name}
        </div>`).join('')}
      ${data.out_edges.length>8?`<div style="font-size:10px;color:var(--text2)">+${data.out_edges.length-8} more</div>`:''}
    </div>`;

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('dh-name').textContent = n.name;
  document.getElementById('detail-panel').classList.add('active');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('active');
}

function showTooltip(e, d) {
  const tip = document.getElementById('tooltip');
  const degree = graphData.edges.filter(x => x.source === d.id || x.target === d.id).length;
  tip.innerHTML = `
    <div class="tt-name">${d.name}</div>
    <span class="tt-type type-${d.node_type}">${d.node_type}</span>
    <div style="margin-top:4px;font-size:10px;color:var(--text2)">
      Connections: ${degree}<br>
      ${d.file_path.split('/').pop()}:${d.line_start}
    </div>`;
  tip.style.display = 'block';
  tip.style.left = (e.pageX + 12) + 'px';
  tip.style.top = (e.pageY - 20) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function showContextMenu(e, d) {
  ctxNode = d;
  const menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  menu.style.left = e.pageX + 'px';
  menu.style.top = e.pageY + 'px';
}

function hideContextMenu() {
  document.getElementById('ctx-menu').style.display = 'none';
}

function ctxShowDetail() { hideContextMenu(); showDetail(ctxNode.id); }
async function ctxTraverse() {
  hideContextMenu();
  const resp = await fetch(`${API}/api/traverse?source=${ctxNode.id}&hops=2&direction=both`);
  graphData = await resp.json();
  render();
}
async function ctxImpact() {
  hideContextMenu();
  const resp = await fetch(`${API}/api/impact/${ctxNode.id}`);
  const data = await resp.json();
  showImpactOverlay(data);
}
async function ctxCallers() {
  hideContextMenu();
  const resp = await fetch(`${API}/api/callers/${ctxNode.id}`);
  const data = await resp.json();
  alert(`${data.target.name} is called by ${data.total} functions:\n${data.callers.slice(0,12).map(c=>c.name).join('\n')}`);
}
async function ctxCallees() {
  hideContextMenu();
  const resp = await fetch(`${API}/api/callees/${ctxNode.id}`);
  const data = await resp.json();
  alert(`${data.target.name} calls ${data.total} functions:\n${data.callees.slice(0,12).map(c=>c.name).join('\n')}`);
}

// ─── Toolbar Actions ──────────────────────────────────────
function fitGraph() {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
}

function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById('btn-labels').classList.toggle('active', showLabels);
  render();
}

async function traverseFrom() {
  if (!selectedNode) { alert('请先点击选择一个节点'); return; }
  const resp = await fetch(`${API}/api/traverse?source=${selectedNode}&hops=3&direction=both`);
  graphData = await resp.json();
  render();
}

async function impactAnalysis() {
  if (!selectedNode) { alert('请先点击选择一个节点'); return; }
  const resp = await fetch(`${API}/api/impact/${selectedNode}`);
  showImpactOverlay(await resp.json());
}

function showImpactOverlay(data) {
  if (data.error) { alert(data.error); return; }
  const card = document.getElementById('overlay-card');
  card.innerHTML = `
    <h2>💥 爆炸半径分析</h2>
    <p>如果修改 <b style="color:var(--accent)">${nodeIndex(data.target).name}</b>，会影响：</p>
    <div class="impact-stats">
      <div class="is-card"><div class="is-val">${data.impacted_count}</div><div class="is-lbl">受影响节点</div></div>
      <div class="is-card"><div class="is-val">${data.impact_depth}</div><div class="is-lbl">最大深度</div></div>
    </div>
    <button onclick="viewImpactGraph('${data.target}')">查看影响图</button>
    <button class="secondary" onclick="closeOverlay()">关闭</button>`;
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

async function viewImpactGraph(targetId) {
  closeOverlay();
  const resp = await fetch(`${API}/api/impact/${targetId}`);
  graphData = await resp.json();
  render();
}

function nodeIndex(id) { return graphData.nodes.find(n=>n.id===id)||{}; }

// ─── Search ───────────────────────────────────────────────
let searchTimer;
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const q = this.value.trim();
  if (!q) {
    document.getElementById('search-results').classList.remove('active');
    return;
  }
  searchTimer = setTimeout(async () => {
    const resp = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
    const results = await resp.json();
    const container = document.getElementById('search-results');
    container.innerHTML = results.length === 0
      ? '<div style="padding:16px;color:var(--text2);font-size:12px">No results</div>'
      : results.map(r => `
        <div class="result-item" onclick="jumpToNode('${r.id}')">
          <div class="rname">${r.name} <span class="rtype type-${r.node_type}">${r.node_type}</span></div>
          <div class="rpath">${r.file_path}:${r.line_start}</div>
        </div>`).join('');
    container.classList.add('active');
  }, 200);
});

async function jumpToNode(nodeId) {
  document.getElementById('search-results').classList.remove('active');
  document.getElementById('search-input').value = '';
  const resp = await fetch(`${API}/api/neighbors/${nodeId}`);
  graphData = await resp.json();
  selectedNode = nodeId;
  render();
  showDetail(nodeId);
}

// ─── Mode Switcher ────────────────────────────────────────
async function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('#mode-bar button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

  if (mode === 'all') {
    const resp = await fetch(`${API}/api/graph`);
    graphData = await resp.json();
  } else {
    const resp = await fetch(`${API}/api/graph?edge_type=${mode}`);
    graphData = await resp.json();
  }
  render();
}

// ─── Helpers ──────────────────────────────────────────────
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ─── Start ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', () => { if(graphData) render(); });
</script>
