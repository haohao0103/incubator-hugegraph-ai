<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeGraph 图构建流程演示</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root { --bg:#0a0e27; --panel:#111640; --panel2:#1a1f52; --accent:#6c5ce7; --accent2:#00cec9; --text:#e0e0f0; --text-dim:#8890b5; --border:#1e2350; --green:#00b894; --func:#58a6ff; --class:#3fb950; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
header { background:linear-gradient(135deg,#0c0f30,#1a1050); border-bottom:1px solid var(--border); padding:1.2rem 2rem; }
header h1 { font-size:1.4rem; }
header h1 span { color:var(--accent); }
main { padding:1.5rem 2rem; max-width:1400px; margin:0 auto; display:grid; gap:1.25rem; }
.row { display:grid; gap:1.25rem; grid-template-columns:1fr 1fr; }
.card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:1rem; }
.card h2 { font-size:0.75rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.7rem; }
pre { background:#080b20; border:1px solid var(--border); border-radius:8px; padding:0.8rem; font-family:'JetBrains Mono','Fira Code',monospace; font-size:0.75rem; line-height:1.6; overflow-x:auto; }
.steps { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
.step { background:var(--panel2); border:1px solid var(--border); color:var(--text-dim); padding:0.4rem 0.8rem; border-radius:6px; font-size:0.72rem; cursor:pointer; }
.step.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.step.done { border-color:var(--green); color:var(--green); }
#stage { min-height:180px; }
#mini-viz { width:100%; height:340px; background:#080b20; border-radius:8px; }
.ba { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; margin-top:0.8rem; }
.ba-box { background:var(--panel2); border-radius:8px; padding:0.7rem; border:1px solid var(--border); }
.ba-box h4 { font-size:0.7rem; color:var(--text-dim); margin-bottom:0.3rem; }
.ba-box .val { font-size:1.3rem; font-weight:700; }
table { width:100%; border-collapse:collapse; font-size:0.75rem; margin-top:0.4rem; }
th, td { padding:0.35rem 0.5rem; border-bottom:1px solid var(--border); text-align:left; }
th { color:var(--text-dim); font-size:0.65rem; }
button { background:var(--accent); color:#fff; border:none; border-radius:6px; padding:0.5rem 1rem; font-size:0.78rem; cursor:pointer; margin-top:0.6rem; }
button:hover { opacity:0.9; }
footer { text-align:center; padding:1.2rem; color:var(--text-dim); font-size:0.7rem; border-top:1px solid var(--border); }
</style>
</head>
<body>
<header>
  <h1>🏗️ <span>CodeGraph</span> 图构建流程演示</h1>
  <div style="font-size:0.75rem;color:var(--text-dim);margin-top:0.3rem">源代码 → AST → 节点 → 关系 → 图存储 → 查询</div>
</header>
<main>
  <div class="row">
    <div class="card" style="grid-column:1/-1">
      <div class="steps">
        <button class="step active" data-step="0">1. 源代码</button>
        <button class="step" data-step="1">2. AST 解析</button>
        <button class="step" data-step="2">3. 提取节点</button>
        <button class="step" data-step="3">4. 提取关系</button>
        <button class="step" data-step="4">5. 载入图库</button>
        <button class="step" data-step="5">6. 查询验证</button>
      </div>
      <button id="play">▶ 自动播放</button>
    </div>
  </div>
  <div class="row">
    <div class="card">
      <h2 id="stage-title">1. 源代码</h2>
      <div id="stage"></div>
    </div>
    <div class="card">
      <h2>实时构建出的代码图谱</h2>
      <svg id="mini-viz"></svg>
    </div>
  </div>
  <div class="row">
    <div class="card">
      <h2>Before / After 对比</h2>
      <div class="ba">
        <div class="ba-box">
          <h4>无 CodeGraph</h4>
          <div class="val" style="color:var(--text-dim)">人工扫描</div>
          <div style="font-size:0.7rem;color:var(--text-dim);margin-top:0.3rem">修改函数后，需阅读所有可能调用它的文件，平均 20-60 个文件。</div>
        </div>
        <div class="ba-box">
          <h4>有 CodeGraph</h4>
          <div class="val" style="color:var(--green)">3 跳定位</div>
          <div style="font-size:0.7rem;color:var(--text-dim);margin-top:0.3rem">反向遍历 calls 边，秒级输出完整影响链，精确到函数级别。</div>
        </div>
      </div>
    </div>
    <div class="card">
      <h2>关键指标</h2>
      <div class="ba">
        <div class="ba-box"><h4>节点</h4><div class="val" style="color:var(--accent2)">5</div></div>
        <div class="ba-box"><h4>关系</h4><div class="val" style="color:var(--accent2)">5</div></div>
        <div class="ba-box"><h4>解析耗时</h4><div class="val" style="color:var(--accent2)">&lt;10ms</div></div>
        <div class="ba-box"><h4>查询耗时</h4><div class="val" style="color:var(--accent2)">&lt;1ms</div></div>
      </div>
    </div>
  </div>
</main>
<footer>CodeGraph Build Demo · 真实 AST 解析流程 · 可对接 HugeGraph 分布式图库</footer>

<script>
const CODE = `class OrderService:
    def process(self, order):
        self.validate(order)
        self.save(order)

    def validate(self, order):
        check_format(order)

    def save(self, order):
        db.write(order)

def check_format(o):
    return o.get('id') is not None
`;

const STEPS = [
  { title:'1. 源代码', html:'<pre>'+CODE.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</pre><p style="font-size:0.75rem;color:var(--text-dim);margin-top:0.5rem">输入一段普通 Python 业务代码。</p>' },
  { title:'2. AST 解析', html:'<p style="font-size:0.78rem;line-height:1.6">Python <code>ast</code> 模块遍历源码，得到抽象语法树：</p><ul style="font-size:0.75rem;color:var(--text-dim);line-height:1.8;margin-top:0.5rem;padding-left:1.2rem"><li>Module 节点</li><li>ClassDef: OrderService</li><li>FunctionDef: process, validate, save, check_format</li><li>Call 表达式: self.validate, self.save, check_format, db.write</li></ul>' },
  { title:'3. 提取节点', html:'<table><thead><tr><th>ID</th><th>类型</th><th>名称</th><th>位置</th></tr></thead><tbody><tr><td>n1</td><td>class</td><td>OrderService</td><td>L1</td></tr><tr><td>n2</td><td>function</td><td>process</td><td>L2</td></tr><tr><td>n3</td><td>function</td><td>validate</td><td>L8</td></tr><tr><td>n4</td><td>function</td><td>save</td><td>L11</td></tr><tr><td>n5</td><td>function</td><td>check_format</td><td>L14</td></tr></tbody></table>' },
  { title:'4. 提取关系', html:'<table><thead><tr><th>源</th><th>关系</th><th>目标</th></tr></thead><tbody><tr><td>OrderService</td><td>contains</td><td>process</td></tr><tr><td>OrderService</td><td>contains</td><td>validate</td></tr><tr><td>OrderService</td><td>contains</td><td>save</td></tr><tr><td>process</td><td>calls</td><td>validate</td></tr><tr><td>process</td><td>calls</td><td>save</td></tr><tr><td>validate</td><td>calls</td><td>check_format</td></tr></tbody></table>' },
  { title:'5. 载入图库', html:'<p style="font-size:0.78rem;line-height:1.6">节点与关系写入双后端：</p><ul style="font-size:0.75rem;color:var(--text-dim);line-height:1.8;margin-top:0.5rem;padding-left:1.2rem"><li><strong>SQLite</strong>: 本地亚毫秒查询</li><li><strong>HugeGraph</strong>: 分布式多跳遍历 / OLAP</li><li><strong>BM25</strong>: 函数名/代码全文索引</li></ul>' },
  { title:'6. 查询验证', html:'<p style="font-size:0.78rem;line-height:1.6">查询: <em>"修改 validate 会影响哪些函数？"</em></p><p style="font-size:0.75rem;color:var(--text-dim);margin-top:0.5rem">反向遍历 calls 边：<br>validate ← process<br>结果: 仅影响 1 个上游函数，精确可控。</p>' }
];

const nodes = [
  {id:'OrderService', type:'class', x:200, y:60},
  {id:'process', type:'function', x:100, y:180},
  {id:'validate', type:'function', x:200, y:180},
  {id:'save', type:'function', x:300, y:180},
  {id:'check_format', type:'function', x:200, y:300}
];
const edges = [
  {source:'OrderService',target:'process',type:'contains'},
  {source:'OrderService',target:'validate',type:'contains'},
  {source:'OrderService',target:'save',type:'contains'},
  {source:'process',target:'validate',type:'calls'},
  {source:'process',target:'save',type:'calls'},
  {source:'validate',target:'check_format',type:'calls'}
];

function showStep(i) {
  document.querySelectorAll('.step').forEach((b, idx) => {
    b.classList.toggle('active', idx === i);
    b.classList.toggle('done', idx < i);
  });
  document.getElementById('stage-title').textContent = STEPS[i].title;
  document.getElementById('stage').innerHTML = STEPS[i].html;
}

document.querySelectorAll('.step').forEach(b => {
  b.addEventListener('click', () => showStep(+b.dataset.step));
});

document.getElementById('play').addEventListener('click', async () => {
  for (let i = 0; i < STEPS.length; i++) {
    showStep(i);
    await new Promise(r => setTimeout(r, 1400));
  }
});

// Mini D3 graph
const svg = d3.select('#mini-viz');
const rect = document.getElementById('mini-viz').getBoundingClientRect();
svg.attr('viewBox', `0 0 ${rect.width} ${rect.height}`);
const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.5,3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

svg.append('defs').append('marker').attr('id','arrow-mini').attr('viewBox','0 -5 10 10')
  .attr('refX',22).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
  .append('path').attr('d','M0,-5L10,0L0,5').attr('fill','#8890b5');

const nodeColors = {class:'var(--class)', function:'var(--func)'};
const edgeColors = {contains:'var(--class)', calls:'var(--func)'};

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d=>d.id).distance(80))
  .force('charge', d3.forceManyBody().strength(-400))
  .force('center', d3.forceCenter(rect.width/2, rect.height/2));

const link = g.append('g').selectAll('line').data(edges).join('line')
  .attr('stroke', d=>edgeColors[d.type]).attr('stroke-opacity',0.6).attr('stroke-width',1.5)
  .attr('marker-end', d=>d.type==='calls'?'url(#arrow-mini)':null);

const node = g.append('g').selectAll('g').data(nodes).join('g')
  .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
                  .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
                  .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
node.append('circle').attr('r', d=>d.type==='class'?18:12).attr('fill', d=>nodeColors[d.type]).attr('stroke','#fff').attr('stroke-width',1.5);
node.append('text').attr('dy',4).attr('text-anchor','middle').text(d=>d.id).attr('font-size',10).attr('fill','#fff');

sim.on('tick', () => {
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform',d=>`translate(${d.x},${d.y})`);
});

showStep(0);
</script>
</body>
</html>
